# Konfiguracja Środowiska Minesweeper
environment:
  min_grid_size: 8                   # Minimalny rozmiar siatki
  max_grid_size: 16                  # Maksymalny rozmiar siatki
  viewport_size: 16                  # Stały rozmiar viewport (zawsze 16x16)
  cell_size: 30                      # Rozmiar komórki w pikselach
  mine_density: 0.15                 # Gęstość min (15% pól to miny)
  
  observation_space:
    low: 0.0                         # Minimalna wartość obserwacji
    high: 1.0                        # Maksymalna wartość obserwacji
    dtype: float32                   # Typ danych obserwacji
  
  action_space:
    type: Discrete                   # Typ przestrzeni akcji
    # n: grid_size * grid_size      # Liczba akcji (pozycja do odkrycia)
  
  max_steps_factor: 300              # Mnożnik max kroków (grid_size * max_steps_factor)

  reward_scaling:
    enable: true                          # Włącz skalowanie nagród
    min_difficulty_multiplier: 1.0        # Mnożnik dla min_grid_size
    max_difficulty_multiplier: 2.5        # Mnożnik dla max_grid_size
    
    # Nagrody bazowe
    base_safe_cell_reward: 1.0            # Nagroda za odkrycie bezpiecznej komórki
    base_mine_penalty: -10.0              # Kara za minę
    base_victory_bonus: 100.0             # Bonus za wygraną
    
    # Milestone bonusy (% odkrytych bezpiecznych pól)
    milestones:
      0.10: 5.0    
      0.25: 10.0   
      0.50: 25.0    
      0.75: 50.0     
      0.90: 100.0     
      1.00: 200.0  

    # Bonus za efektywność (małe kroki na pole)
    efficiency_bonus:
      enable: true
      threshold: 1.5                # Średnio 1.5 kroku na pole
      reward: 10.0

# Konfiguracja modelu PPO
model:
  policy: MultiInputPolicy
  learning_rate: 0.0003
  min_learning_rate: 0.00001
  n_steps: 4096
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  min_ent_coef: 0.01
  vf_coef: 0.5
  device: cuda

  optimizer:
    type: adamw
    weight_decay: 0.0001
    eps: 1.0e-8
    betas: [0.9, 0.999]
  
  cnn_dropout: 0.03
  scalar_dropout: 0.04
  scalar_input_dropout: 0.0
  fusion_dropout: 0.05
  
  convlstm:
    cnn_channels: [64, 128, 256]
    cnn_output_dim: 512
    
    scalar_hidden_dims: [128, 192]
    scalar_output_dim: 128
    
    use_layernorm: true
    use_spatial_attention: true

  policy_kwargs:
    features_extractor_kwargs:
      features_dim: 512
    net_arch:
      pi: [512, 256]
      vf: [512, 512, 256]

# Konfiguracja treningu
training:
  n_envs: 32
  batch_size: 8192
  total_timesteps: 50000000
  eval_freq: 16384
  plot_interval: 1
  max_no_improvement_evals: 50
  min_evals: 20
  enable_channel_logs: false
  gradient_log_freq: 10000
  
  eval_n_envs: 4
  eval_n_repeats: 2
  
  normalization:
    norm_obs: false
    norm_reward: true
    clip_obs: 10.0
    clip_reward: 500.0
    gamma: 0.99
    epsilon: 1.0e-8
    clip_obs_asymmetric: false

# Ścieżki
paths:
  models_dir: models
  logs_dir: logs
  model_path: models/minesweeper_ppo_model.zip
  train_csv_path: logs/train_progress.csv
  plot_path: logs/training_progress.png
  test_progress_path: logs/test_progress.png